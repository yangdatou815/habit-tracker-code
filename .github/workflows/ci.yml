name: CI — DoD Gates

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-test:
    name: Backend Tests & Coverage
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.9"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run all tests with coverage gate (>= 90%)
        run: pytest tests/ -q --cov=app --cov-report=term-missing --cov-fail-under=90

      - name: Run smoke tests
        run: pytest tests/ -m smoke -q

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

  dod-policy-check:
    name: DoD Policy Check
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Check PR body for DoD declaration
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          if echo "$PR_BODY" | grep -qi "DoD Check\|DoD 检查\|质量门禁"; then
            echo "✅ DoD declaration found in PR body"
          else
            echo "❌ PR body must include a 'DoD Check' section documenting:"
            echo "   - Coverage result"
            echo "   - SCT mapping result (US → cases)"
            echo "   - Smoke test result"
            exit 1
          fi
